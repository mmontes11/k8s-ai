apiVersion: serving.kserve.io/v1alpha2
kind: LLMInferenceService
metadata:
  name: facebook-opt
  namespace: kserve
spec:
  baseRefs:
    - name: nvidia-template
    - name: sleep-template
  model:
    name: facebook/opt-125m
    uri: hf://facebook/opt-125m
---
apiVersion: v1
kind: Service
metadata:
  name: facebook-opt
  namespace: kserve
spec:
  ports:
  - appProtocol: http
    name: http
    port: 8000
    protocol: TCP
    targetPort: 8000
  selector:
    app.kubernetes.io/name: facebook-opt
    app.kubernetes.io/part-of: llminferenceservice
    kserve.io/component: workload
  type: ClusterIP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: facebook-opt
  namespace: kserve
spec:
  parentRefs:
    - name: traefik-internal
      namespace: networking
  hostnames:
    - facebook-opt.mmontes-internal.duckdns.org
  rules:
    - backendRefs:
      - name: facebook-opt
        port: 8000
