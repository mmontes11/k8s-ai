apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kserve-crds
  namespace: ai
spec:
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: flux-tenant-ai
    namespace: flux-system
  path: ./infrastructure/kserve/crds
  prune: true
  timeout: 5m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kserve-config
  namespace: ai
spec:
  dependsOn:
    - name: secrets
    - name: kserve-crds
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: flux-tenant-ai
    namespace: flux-system
  path: ./infrastructure/kserve/config
  prune: true
  timeout: 5m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kserve-resources
  namespace: ai
spec:
  dependsOn:
    - name: kserve-config
    - name: cert-manager-crds
      namespace: flux-system
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: flux-tenant-ai
    namespace: flux-system
  path: ./infrastructure/kserve/resources
  prune: true
  timeout: 5m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kserve-llmisvc-resources
  namespace: ai
spec:
  dependsOn:
    - name: kserve-config
    - name: cert-manager-crds
      namespace: flux-system
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: flux-tenant-ai
    namespace: flux-system
  path: ./infrastructure/kserve/llmisvc-resources
  prune: true
  timeout: 5m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kserve-localmodel-resources
  namespace: ai
spec:
  dependsOn:
    - name: kserve-crds
    - name: cert-manager-crds
      namespace: flux-system
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: flux-tenant-ai
    namespace: flux-system
  path: ./infrastructure/kserve/localmodel-resources
  prune: true
  timeout: 5m
