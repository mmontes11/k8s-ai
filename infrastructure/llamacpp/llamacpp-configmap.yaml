apiVersion: v1
kind: ConfigMap
metadata:
  name: llamacpp
data:
  # See:
  # https://github.com/ggml-org/llama.cpp/tree/master/tools/cli
  init.sh: |
    #!/bin/bash
    set -e

    MODELS=(
      "ggml-org|gpt-oss-20b-GGUF|gpt-oss-20b-mxfp4.gguf"
      "ggml-org|Qwen2.5-Coder-7B-Instruct-Q8_0-GGUF|qwen2.5-coder-7b-instruct-q8_0.gguf"
      "unsloth|gemma-4-26B-A4B-it-GGUF|gemma-4-26B-A4B-it-MXFP4_MOE.gguf"
      "unsloth|Qwen3-Coder-30B-A3B-Instruct-GGUF|Qwen3-Coder-30B-A3B-Instruct-Q4_K_M.gguf"
      "unsloth|Qwen3.6-27B-GGUF|Qwen3.6-27B-Q4_K_M.gguf"
      "unsloth|Qwen3.6-35B-A3B-GGUF|Qwen3.6-35B-A3B-UD-IQ4_NL.gguf"
      "unsloth|Qwen3.6-35B-A3B-GGUF|Qwen3.6-35B-A3B-MXFP4_MOE.gguf"
      # "<hf-account>|<model-name>|<model-file.gguf>"
    )

    for model in "${MODELS[@]}"; do
      IFS='|' read -r hf_account model_name model_file <<< "$model"
      MODEL_PATH="${LLAMA_CACHE}/${hf_account}_${model_name}_${model_file}"

      if [ ! -f "$MODEL_PATH" ]; then
        echo "Model $MODEL_PATH not found. Downloading..."

        curl -fLo "$MODEL_PATH" \
          -H "Authorization: Bearer ${HF_TOKEN}" \
          "https://huggingface.co/${hf_account}/${model_name}/resolve/main/${model_file}"
         
        echo "Successfully downloaded $MODEL_PATH"
      else
        echo "Model $MODEL_PATH already exists. Skipping download."
      fi
    done

  # See:
  # https://github.com/ggml-org/llama.cpp/tree/master/tools/llama-bench
  # https://github.com/ggml-org/llama.cpp/blob/master/.devops/tools.sh
  # https://github.com/ggml-org/llama.cpp/discussions/15396
  # https://www.reddit.com/r/LocalLLaMA/comments/1sne4gh/psa_qwen36_ships_with_preserve_thinking_make_sure/
  bench.sh: |
    #!/bin/bash
    set -e

    echo "Starting llama-bench..."
    /app/tools.sh \
      --bench \
      --model "${LLAMA_CACHE}/unsloth_Qwen3.6-35B-A3B-GGUF_Qwen3.6-35B-A3B-MXFP4_MOE.gguf" \
      --threads 1 \
      --flash-attn on \
      --n-prompt 2048,8192 \
      --progress || true

    echo "Benchmark finished"
    sleep infinity

  # See:
  # https://github.com/ggml-org/llama.cpp/blob/master/tools/server
  # https://github.com/ggml-org/llama.cpp/discussions/18939
  # https://huggingface.co/blog/ggml-org/model-management-in-llamacpp
  models.ini: |
    [gemma4:26b-ctx256k]
    model=/models/unsloth_gemma-4-26B-A4B-it-GGUF_gemma-4-26B-A4B-it-MXFP4_MOE.gguf
    alias=gemma4:26b-ctx256k
    ctx-size=262144
    cache-type-k=q8_0
    cache-type-v=q8_0

    [gpt-oss:20b-ctx128k]
    model=/models/ggml-org_gpt-oss-20b-GGUF_gpt-oss-20b-mxfp4.gguf
    alias=gpt-oss:20b-ctx128k
    ctx-size=131072
    cache-type-k=q8_0
    cache-type-v=q8_0

    [qwen25-coder:7b-instruct]
    model=/models/ggml-org_Qwen2.5-Coder-7B-Instruct-Q8_0-GGUF_qwen2.5-coder-7b-instruct-q8_0.gguf
    alias=qwen25-coder:7b-instruct
    ctx-size=0
    cache-reuse=256

    [qwen30-coder:30b-instruct]
    model=/models/unsloth_Qwen3-Coder-30B-A3B-Instruct-GGUF_Qwen3-Coder-30B-A3B-Instruct-Q4_K_M.gguf
    alias=qwen30-coder:30b-instruct
    ctx-size=32768
    cache-type-k=q8_0
    cache-type-v=q8_0
    cache-reuse=256

    [qwen36:27b-ctx128k]
    model=/models/unsloth_Qwen3.6-27B-GGUF_Qwen3.6-27B-Q4_K_M.gguf
    alias=qwen36:27b-ctx128k
    ctx-size=131072
    cache-type-k=q8_0
    cache-type-v=q8_0
    chat-template-kwargs={"preserve_thinking": true}

    [qwen36:35b]
    model=/models/unsloth_Qwen3.6-35B-A3B-GGUF_Qwen3.6-35B-A3B-MXFP4_MOE.gguf
    alias=qwen36:35b
    ctx-size=49152
    cache-type-k=q8_0
    cache-type-v=q8_0
    chat-template-kwargs={"preserve_thinking": true}

    [qwen36:35b-ctx256k]
    model=/models/unsloth_Qwen3.6-35B-A3B-GGUF_Qwen3.6-35B-A3B-UD-IQ4_NL.gguf
    alias=qwen36:35b-ctx256k
    ctx-size=262144
    cache-type-k=q8_0
    cache-type-v=q8_0
    chat-template-kwargs={"preserve_thinking": true}
