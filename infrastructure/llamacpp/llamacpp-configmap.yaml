apiVersion: v1
kind: ConfigMap
metadata:
  name: llamacpp
data:
  init.sh: |
    #!/bin/bash
    set -e

    hf download unsloth/gemma-4-26B-A4B-it-GGUF \
      --local-dir /models/unsloth/gemma-4-26B-A4B-it-GGUF \
      --include "*UD-Q4_K_XL*" "*mtp-*" "*mmproj-BF16*"

    hf download unsloth/Qwen3-Coder-30B-A3B-Instruct-GGUF \
      --local-dir /models/unsloth/Qwen3-Coder-30B-A3B-Instruct-GGUF \
      --include "*UD-Q4_K_XL*"

    hf download unsloth/Qwen3-VL-30B-A3B-Instruct-GGUF \
      --local-dir /models/unsloth/Qwen3-VL-30B-A3B-Instruct-GGUF \
      --include "*UD-Q4_K_XL*" "*mmproj-BF16*"

    hf download unsloth/Qwen3.6-27B-MTP-GGUF \
      --local-dir /models/unsloth/Qwen3.6-27B-MTP-GGUF \
      --include "*UD-Q4_K_XL*"

    hf download unsloth/Qwen3.6-35B-A3B-MTP-GGUF \
      --local-dir /models/unsloth/Qwen3.6-35B-A3B-MTP-GGUF \
      --include "*UD-Q4_K_XL*" "*UD-IQ4_NL*" "*mmproj-BF16*"

  # See:
  # https://github.com/ggml-org/llama.cpp/tree/master/tools/llama-bench
  # https://github.com/ggml-org/llama.cpp/blob/master/.devops/tools.sh
  # https://github.com/ggml-org/llama.cpp/discussions/15396
  # https://www.reddit.com/r/LocalLLaMA/comments/1sne4gh/psa_qwen36_ships_with_preserve_thinking_make_sure/
  # https://unsloth.ai/docs/models/qwen3.6#qwen3.6-inference-tutorials
  # https://unsloth.ai/docs/models/mtp
  bench.sh: |
    #!/bin/bash
    set -e

    echo "Starting llama-bench..."
    /app/tools.sh \
      --bench \
      --model "/models/unsloth/Qwen3.6-35B-A3B-MTP-GGUF/Qwen3.6-35B-A3B-UD-Q4_K_XL.gguf" \
      --threads 1 \
      --flash-attn on \
      --n-prompt 2048,8192 \
      --progress || true

    echo "Benchmark finished"
    sleep infinity

  # See:
  # https://github.com/ggml-org/llama.cpp/blob/master/tools/server
  # https://unsloth.ai/docs/models
  # https://github.com/ggml-org/llama.cpp/discussions/18939
  # https://huggingface.co/blog/ggml-org/model-management-in-llamacpp
  # https://huggingface.co/Qwen/Qwen3.6-27B#using-qwen36-via-the-chat-completions-api
  # https://www.reddit.com/r/LocalLLaMA/comments/1sne4gh/psa_qwen36_ships_with_preserve_thinking_make_sure/
  models.ini: |
    [gemma4:26b-ctx256k]
    model=/models/unsloth/gemma-4-26B-A4B-it-GGUF/gemma-4-26B-A4B-it-UD-Q4_K_XL.gguf
    model-draft=/models/unsloth/gemma-4-26B-A4B-it-GGUF/mtp-gemma-4-26B-A4B-it.gguf
    mmproj=/models/unsloth/gemma-4-26B-A4B-it-GGUF/mmproj-BF16.gguf
    alias=gemma4:26b-ctx256k
    ctx-size=262144
    parallel=1
    cache-type-k=q8_0
    cache-type-v=q8_0
    spec-type=draft-mtp
    spec-draft-n-max=2

    [qwen3-coder:30b-instruct]
    model=/models/unsloth/Qwen3-Coder-30B-A3B-Instruct-GGUF/Qwen3-Coder-30B-A3B-Instruct-UD-Q4_K_XL.gguf
    alias=qwen3-coder:30b-instruct
    ctx-size=32768
    cache-type-k=q8_0
    cache-type-v=q8_0
    cache-reuse=256

    [qwen3-vl:30b-instruct]
    model=/models/unsloth/Qwen3-VL-30B-A3B-Instruct-GGUF/Qwen3-VL-30B-A3B-Instruct-UD-Q4_K_XL.gguf
    mmproj=/models/unsloth/Qwen3-VL-30B-A3B-Instruct-GGUF/mmproj-BF16.gguf
    alias=qwen3-vl:30b-instruct,qwen3-vl
    ctx-size=8192
    parallel=1
    temperature=0.7
    top-p=0.8
    top-k=20
    min-p=0.8
    presence-penalty=1.5
    cache-type-k=q8_0
    cache-type-v=q8_0

    [qwen36:27b-ctx128k]
    model=/models/unsloth/Qwen3.6-27B-MTP-GGUF/Qwen3.6-27B-UD-Q4_K_XL.gguf
    alias=qwen36:27b-ctx128k
    ctx-size=131072
    parallel=1
    cache-type-k=q8_0
    cache-type-v=q8_0
    temperature=0.6
    top-p=0.95
    top-k=20
    min-p=0.0
    presence-penalty=0.0
    repeat-penalty=1.0
    spec-type=draft-mtp
    spec-draft-n-max=2
    chat-template-kwargs={"preserve_thinking": true}

    [qwen36:35b]
    model=/models/unsloth/Qwen3.6-35B-A3B-MTP-GGUF/Qwen3.6-35B-A3B-UD-Q4_K_XL.gguf
    mmproj=/models/unsloth/Qwen3.6-35B-A3B-MTP-GGUF/mmproj-BF16.gguf
    alias=qwen36:35b
    ctx-size=49152
    parallel=1
    cache-type-k=q8_0
    cache-type-v=q8_0
    spec-type=draft-mtp
    spec-draft-n-max=2

    [qwen36:35b-ctx256k]
    model=/models/unsloth/Qwen3.6-35B-A3B-MTP-GGUF/Qwen3.6-35B-A3B-UD-IQ4_NL.gguf
    alias=qwen36:35b-ctx256k
    ctx-size=262144
    parallel=1
    cache-type-k=q8_0
    cache-type-v=q8_0
    temperature=0.6
    top-p=0.95
    top-k=20
    min-p=0.0
    presence-penalty=0.0
    repeat-penalty=1.0
    spec-type=draft-mtp
    spec-draft-n-max=2
    chat-template-kwargs={"preserve_thinking": true}
