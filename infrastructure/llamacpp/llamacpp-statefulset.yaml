apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: llamacpp
spec:
  replicas: 1
  serviceName: llamacpp
  selector:
    matchLabels:
      app: llamacpp
  template:
    metadata:
      labels:
        app: llamacpp
    spec:
      runtimeClassName: nvidia
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: nvidia.com/gpu.present
                operator: Exists
      tolerations:
      - effect: NoSchedule
        key: node.mmontes.io/type
        value: compute-xlarge

      initContainers:
      - name: init
        image: ghcr.io/ggml-org/llama.cpp:full-cuda13-b8895
        env:
        - name: LLAMA_CACHE
          value: /models
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token
              key: HF_TOKEN
        command:
          - /bin/bash
        args:
          - /config/init.sh
        volumeMounts:
        - name: config
          mountPath: /config
          readOnly: true
        - name: models
          mountPath: /models
        resources:
          requests:
            cpu: "1"
            memory: 2Gi
          limits:
            memory: 4Gi
  
      containers:
      - name: llama-server
        image: ghcr.io/ggml-org/llama.cpp:full-cuda13-b8895
        env:
        - name: LLAMA_CACHE
          value: /models

        # SERVER:
        # See:
        # https://github.com/ggml-org/llama.cpp/tree/master/tools/server
        # https://github.com/ggml-org/llama.cpp/blob/master/.devops/tools.sh
        args:
          - --server
          - --host
          - 0.0.0.0
          - --port
          - "8080"
          - --models-dir
          - /models
          - --models-preset
          - /config/models.ini
          - --models-max
          - "1"
          - --models-autoload
          - --sleep-idle-seconds
          - "600"
          - --n-gpu-layers
          - "999"
          - --fit
          - "off"
          - --flash-attn
          - "on"
          - --parallel
          - "1"
          # TODO: Metrics disabled, as Prometheus scrapes will awake the models
          # See: https://github.com/ggml-org/llama.cpp/issues/20227
          # - --metrics

        # BENCHMARK:
        # command:
        #   - /bin/bash
        # args:
        #   - /config/bench.sh

        ports:
        - containerPort: 8080
          name: api
        resources:
          requests:
            cpu: "1"
            memory: 4Gi
          limits:
            nvidia.com/gpu: "1"
        volumeMounts:
        - name: config
          mountPath: /config
          readOnly: true
        - name: models
          mountPath: /models
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 45
          periodSeconds: 10

      volumes:
      - name: config
        configMap:
          name: llamacpp
          defaultMode: 0777

  volumeClaimTemplates:
  - metadata:
      name: models
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 300Gi
      storageClassName: topolvm