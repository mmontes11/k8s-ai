apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mcp-grafana
spec:
  chartRef:
    kind: OCIRepository
    name: grafana-mcp
  interval: 10m
  values:
    fullnameOverride: mcp-grafana
    grafana:
      url: "http://kube-prometheus-stack-grafana.monitoring.svc.cluster.local"
      apiKeySecret:
        name: mcp-grafana
        key: token
    extraArgs:
      - --address
      - 0.0.0.0:8000
      - -t
      - streamable-http
      - --disable-write
      - --debug
      - --log-level
      - debug
    service:
      port: 8000
