apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kserve-localmodel-resources
spec:
  chartRef:
    kind: OCIRepository
    name: kserve-localmodel-resources
  interval: 10m
  values:
    kserve:
      createSharedResources: false
      localmodel:
        enabled: true
        controller:
          resources:
            requests:
              cpu: 100m
              memory: 200Mi
            limits:
              cpu: 100m
              memory: 300Mi
        agent:
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                - matchExpressions:
                  - key: nvidia.com/gpu.present
                    operator: Exists
