apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kserve-llmisvc-resources
spec:
  chartRef:
    kind: OCIRepository
    name: kserve-llmisvc-resources
  interval: 10m
  values:
    kserve:
      createSharedResources: false
      llmisvc:
        controller:
          resources:
            requests:
              cpu: 100m
              memory: 300Mi
            limits:
              memory: 300Mi
