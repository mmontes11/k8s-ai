apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-github
  labels:
    app: mcp-github
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-github
  template:
    metadata:
      labels:
        app: mcp-github
    spec:
      containers:
        - name: mcp-github
          image: ghcr.io/github/github-mcp-server:0.33.1
          imagePullPolicy: IfNotPresent
          args:
            -  http 
            - --port
            - "8080"
            - --base-url 
            - https://mcp-github.mmontes-internal.duckdns.org
            - --base-path 
            - /mcp
            - --toolsets
            - default,stargazers
            - --scope-challenge
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: GITHUB_PERSONAL_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gh-token
                  key: GITHUB_TOKEN
          readinessProbe:
            tcpSocket:
              port: 8080
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              memory: "512Mi"
