apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: ollama
spec:
  chart:
    spec:
      chart: ollama
      sourceRef:
        kind: HelmRepository
        name: ollama
      version: "1.46.0"
  interval: 1h0m0s
  values:
    ollama:
      port: 11434
      gpu:
        enabled: true
        type: nvidia
        number: 1
      models:
        pull:
          - embeddinggemma:300m
          - gemma3:4b
          - gpt-oss:20b
          - qwen3-coder:30b
          - qwen3-embedding:8b
          - qwen3-vl:8b-instruct
        # create:
        # - name: gpt-oss:20b-ctx128k
        #   template: |
        #     FROM gpt-oss:20b
        #     PARAMETER num_ctx 131072
        run: []
        clean: true
    service:
      type: ClusterIP
      port: 11434
    resources:
      requests:
        cpu: "1"
        memory: 2Gi
      limits:
        memory: 8Gi
        nvidia.com/gpu: "1"
    # See: https://github.com/ollama/ollama/blob/main/envconfig/config.go
    extraEnv:
      - name: OLLAMA_DEBUG
        value: "1"
      # See: https://docs.ollama.com/faq#how-does-ollama-handle-concurrent-requests ------
      - name: OLLAMA_MAX_LOADED_MODELS
        value: "3"
      - name: OLLAMA_NUM_PARALLEL
        value: "1"
      - name: OLLAMA_MAX_QUEUE
        value: "512"
      # ------------------------------------------------------------------------------
      - name: OLLAMA_KEEP_ALIVE
        value: "10m"
      - name: OLLAMA_LOAD_TIMEOUT
        value: "5m"
      # See: https://docs.ollama.com/context-length
      - name: OLLAMA_CONTEXT_LENGTH
        # value: "16384"
        value: "8192"
      - name: OLLAMA_MULTIUSER_CACHE
        value: "false"
      - name: OLLAMA_NOPRUNE
        value: "false"
      - name: OLLAMA_NOHISTORY
        value: "false"
      # See: https://docs.ollama.com/faq#how-can-i-enable-flash-attention
      - name: OLLAMA_FLASH_ATTENTION
        value: "true"
      # See: https://docs.ollama.com/faq?utm_source=chatgpt.com#how-can-i-set-the-quantization-type-for-the-k/v-cache
      - name: OLLAMA_KV_CACHE_TYPE
        value: "q8_0"
      - name: OLLAMA_SCHED_SPREAD
        value: "false"
      - name: OLLAMA_NEW_ENGINE
        value: "true"
    persistentVolume:
      enabled: true
      size: 300Gi
      storageClass: topolvm
    runtimeClassName: nvidia
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            - key: nvidia.com/gpu.present
              operator: Exists
    tolerations:
    - effect: NoSchedule
      key: node.mmontes.io/type
      value: compute-xlarge