apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-n8n
  labels:
    app: mcp-n8n
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-n8n
  template:
    metadata:
      labels:
        app: mcp-n8n
    spec:
      containers:
        - name: mcp-n8n
          image: ghcr.io/czlonkowski/n8n-mcp:2.47.1
          imagePullPolicy: Always
          env:
            - name: N8N_MODE
              value: "true"
            - name: MCP_MODE
              value: "http"
            - name: N8N_API_URL
              value: "http://n8n-main.ai.svc.cluster.local:5678"
            - name: N8N_API_KEY
              valueFrom:
                secretKeyRef:
                  name: n8n-token
                  key: N8N_TOKEN
            - name: MCP_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: n8n-token
                  key: N8N_TOKEN
            - name: AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: n8n-token
                  key: N8N_TOKEN
            - name: PORT
              value: "3000"
            - name: LOG_LEVEL
              value: "info"
            - name: TRUST_PROXY
              value: "1"
          ports:
            - containerPort: 3000
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            periodSeconds: 10
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            periodSeconds: 20
            initialDelaySeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
