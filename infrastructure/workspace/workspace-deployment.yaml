apiVersion: apps/v1
kind: Deployment
metadata:
  name: workspace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workspace
  template:
    metadata:
      labels:
        app: workspace
    spec:
      securityContext:
        fsGroup: 1111
      runtimeClassName: nvidia
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: nvidia.com/gpu.present
                operator: Exists
      tolerations:
      - effect: NoSchedule
        key: node.mmontes.io/type
        value: compute-xlarge
      initContainers:
        - name: sync
          image: ghcr.io/mmontes11/ai-workspace:0.2.0
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              if [ $(ls -A /home/mmontes | grep -v "lost+found" | wc -l) -eq 0 ]; then
                echo "PVC is empty (ignoring lost+found). Initializing home dir..."
                cp -rp /opt/template/. /home/mmontes/
              else
                echo "PVC exists. Syncing dependencies..."  
                
                [ -d "/opt/template/usr/local/go" ] && mkdir -p /home/mmontes/usr/local && rsync -av --delete /opt/template/usr/local/go/ /home/mmontes/usr/local/go/
                
                for dir in .local/bin .cargo/bin; do
                  if [ -d "/opt/template/$dir" ]; then
                    mkdir -p "/home/mmontes/$dir"
                    rsync -av --delete "/opt/template/$dir/" "/home/mmontes/$dir/"
                  fi
                done
              fi
              echo "Sync complete."
          volumeMounts:
            - name: home-storage
              mountPath: /home/mmontes
      containers:
        - name: workspace
          image: ghcr.io/mmontes11/ai-workspace:0.1.0
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              memory: "8Gi"
              nvidia.com/gpu: 1
          ports:
            - containerPort: 4096
          volumeMounts:
            - name: home-storage
              mountPath: /home/mmontes
      volumes:
        - name: home-storage
          persistentVolumeClaim:
            claimName: workspace