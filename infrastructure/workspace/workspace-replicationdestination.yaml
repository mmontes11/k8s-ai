apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: workspace
spec:
  trigger:
    # schedule: "0 4 * * *"
    manual: workspace-7
  restic:
    repository: restic-workspace
    destinationPVC: home-opencode-0
    # Direct method is required to inherit tolerations from Pod.
    copyMethod: Direct
    moverResources:
      requests:
        cpu: 1
        memory: 300Mi
      limits:
        memory: 4Gi
    cacheCapacity: 5Gi
    cacheAccessModes:
      - ReadWriteOnce
    customCA:
      secretName: homelab-bundle
      key: ca.crt
