apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: workspace
spec:
  sourcePVC: home-storage-workspace-0
  trigger:
    schedule: "0 1 * * *"
    # manual: workspace-2
  restic:
    repository: restic-workspace
    retain:
      daily: 7
    pruneIntervalDays: 14
    unlock: workspace-1
    # Direct method is required to inherit tolerations from Pod.
    copyMethod: Direct
    moverResources:
      requests:
        cpu: 1
        memory: 300Mi
      limits:
        memory: 4Gi
    cacheCapacity: 5Gi
    cacheAccessModes:
      - ReadWriteOnce
    customCA:
      secretName: homelab-bundle
      key: ca.crt
