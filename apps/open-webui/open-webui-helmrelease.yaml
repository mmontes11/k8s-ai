apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: open-webui
spec:
  chart:
    spec:
      chart: open-webui
      sourceRef:
        kind: HelmRepository
        name: open-webui
      version: "15.2.0"
  interval: 1h0m0s
  values:
    workload:
      kind: StatefulSet
    ollama:
      enabled: false
    openaiBaseApiUrls:
      - http://llamacpp.ai.svc.cluster.local:8080/v1
    pipelines:
      enabled: false
    websocket:
      enabled: true
      manager: redis
      url: redis://redis.database.svc.cluster.local:6379/2
      redis:
        enabled: false
    persistence:
      enabled: true
      existingClaim: open-webui
    service:
      type: ClusterIP
      port: 80
    extraEnvVars:
      - name: WEBUI_NAME
        value: 草泥马🦙
      - name: BYPASS_MODEL_ACCESS_CONTROL
        value: "true"