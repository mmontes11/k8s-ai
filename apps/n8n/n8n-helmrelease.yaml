apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: n8n
spec:
  chartRef:
    kind: OCIRepository
    name: n8n
  interval: 10m
  values:
    queueMode:
      enabled: false
    database:
      type: sqlite
      useExternal: false
    redis:
      enabled: false
    persistence:
      enabled: true
      existingClaim: n8n
    resources:
      main:
        requests:
          cpu: 1
          memory: 512Mi
        limits:
          memory: 2Gi
    strategy:
      type: Recreate
    service:
      type: ClusterIP
      port: 5678
    executions:
      timeout: 3600 # 1h   
    config:
      timezone: UTC
      # See:
      # https://docs.n8n.io/hosting/configuration/environment-variables/deployment/
      # https://docs.n8n.io/hosting/configuration/environment-variables/endpoints/
      extraEnv:
        - name: N8N_LISTEN_ADDRESS
          value: "0.0.0.0"
        - name: N8N_PROXY_HOPS
          value: "10"
        - name: N8N_SECURE_COOKIE
          value: "false"
        - name: N8N_EDITOR_BASE_URL
          value: "https://n8n.mmontes-internal.duckdns.org"
        - name: WEBHOOK_URL
          value: "https://n8n.mmontes-internal.duckdns.org"
        - name: N8N_LOG_LEVEL
          value: "debug"
    secretRefs:
      existingSecret: n8n