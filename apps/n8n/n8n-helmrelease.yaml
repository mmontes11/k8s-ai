apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: n8n
spec:
  chartRef:
    kind: OCIRepository
    name: n8n
  interval: 10m
  values:
    queueMode:
      enabled: false
    database:
      type: sqlite
      useExternal: false
    redis:
      enabled: false
    persistence:
      enabled: true
      size: 5Gi
      storageClass: rook-ceph
    config:
      # See:
      # https://docs.n8n.io/hosting/configuration/environment-variables/deployment/
      # https://docs.n8n.io/hosting/configuration/environment-variables/endpoints/
      extraEnv:
        - name: N8N_LISTEN_ADDRESS
          value: "0.0.0.0"
        - name: N8N_PROXY_HOPS
          value: "10"
        - name: N8N_SECURE_COOKIE
          value: "false"
        - name: N8N_EDITOR_BASE_URL
          value: "https://n8n.mmontes-internal.duckdns.org"
        - name: WEBHOOK_URL
          value: "https://n8n.mmontes-internal.duckdns.org"
    secretRefs:
      existingSecret: n8n
    service:
      type: ClusterIP
      port: 5678
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: n8n-main
            patch: |
              - op: replace
                path: /spec/strategy
                value:
                  type: Recreate