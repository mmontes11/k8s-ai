apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: n8n
spec:
  sourcePVC: n8n
  trigger:
    # schedule: "0 1 * * *"
    manual: n8n-2
  restic:
    repository: restic-n8n
    retain:
      daily: 7
    pruneIntervalDays: 14
    unlock: n8n-1
    copyMethod: Clone
    moverResources:
      requests:
        cpu: 1
        memory: 300Mi
      limits:
        memory: 4Gi
    cacheCapacity: 5Gi
    cacheAccessModes:
      - ReadWriteOnce
    customCA:
      secretName: homelab-bundle
      key: ca.crt
