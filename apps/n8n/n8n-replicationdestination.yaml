apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: n8n
spec:
  trigger:
    # schedule: "0 4 * * *"
    manual: n8n-4
  restic:
    repository: restic-n8n
    destinationPVC: n8n
    copyMethod: Snapshot
    moverResources:
      requests:
        cpu: 1
        memory: 300Mi
      limits:
        memory: 4Gi
    cacheCapacity: 5Gi
    cacheAccessModes:
      - ReadWriteOnce
    customCA:
      secretName: homelab-bundle
      key: ca.crt
