apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: opencode
spec:
  serviceName: opencode
  replicas: 1
  selector:
    matchLabels:
      app: opencode
  template:
    metadata:
      labels:
        app: opencode
    spec:
      securityContext:
        fsGroup: 1111
      runtimeClassName: nvidia
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: nvidia.com/gpu.present
                operator: Exists
      tolerations:
      - effect: NoSchedule
        key: node.mmontes.io/type
        value: compute-xlarge
      volumes:
        - name: opencode
          configMap:
            name: opencode

      initContainers:
        - name: sync
          image: ghcr.io/mmontes11/opencode:b7c8e31
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              if [ $(ls -A /home/mmontes | grep -v "lost+found" | wc -l) -eq 0 ]; then
                echo "PVC is empty. Initializing..."
                rsync -rlptDq /opt/template/ /home/mmontes/
              else
                echo "PVC exists. Syncing..."
                for dir in .opencode/bin usr/local/go go/bin; do
                  if [ -d "/opt/template/$dir" ]; then
                    echo "Updating $dir..."
                    mkdir -p "/home/mmontes/$dir"
                    rsync -rlptDq --no-perms --delete "/opt/template/$dir/" "/home/mmontes/$dir/" || true
                  fi
                done
              fi
              mkdir -p /home/mmontes/.ssh
              chmod 700 /home/mmontes/.ssh
              chmod -R 600 /home/mmontes/.ssh || true
              chown -R 1000:1000 /home/mmontes/
              echo "Sync complete."
          volumeMounts:
            - name: home
              mountPath: /home/mmontes

      containers:
        - name: opencode
          image: ghcr.io/mmontes11/opencode:b7c8e31
          env:
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gh-token
                  key: GITHUB_TOKEN
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: HF_TOKEN
            - name: N8N_TOKEN
              valueFrom:
                secretKeyRef:
                  name: n8n-token
                  key: N8N_TOKEN
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              nvidia.com/gpu: "1"
          ports:
            - containerPort: 4096
          volumeMounts:
            - name: home
              mountPath: /home/mmontes
            - name: opencode
              mountPath: /home/mmontes/.config/opencode/opencode.json
              subPath: opencode.json
  volumeClaimTemplates:
    - metadata:
        name: home
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: "topolvm"
        resources:
          requests:
            storage: 100Gi