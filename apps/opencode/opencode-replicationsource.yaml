apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: opencode
spec:
  sourcePVC: home-opencode-0
  trigger:
    # schedule: "0 1 * * *"
    manual: opencode-2
  restic:
    repository: restic-opencode
    retain:
      daily: 7
    pruneIntervalDays: 14
    unlock: opencode-1
    # Direct method is required to inherit tolerations from Pod.
    copyMethod: Direct
    moverResources:
      requests:
        cpu: 1
        memory: 300Mi
      limits:
        memory: 4Gi
    cacheCapacity: 5Gi
    cacheAccessModes:
      - ReadWriteOnce
